<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>拼字小特工 · Spelling Agent</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --paper:#F6F7FB; --card:#FFFFFF; --ink:#232A4D; --ink2:#5A6183; --ink3:#9AA0BD;
    --violet:#6C4CE0; --violet-d:#573BC4; --marker:#FFD84D; --marker-soft:#FFF0B3;
    --green:#2FB47C; --green-d:#1E9A66; --coral:#FF6B6B; --sky:#2D9CDB;
    --line:#E7E9F5; --shadow:0 10px 30px -12px rgba(35,42,77,.28);
    --catA:#6C4CE0; --catB:#E0567B; --catC:#2FB47C; --catD:#E8892B; --catE:#2D9CDB; --catF:#8A5BD6;
  }
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:ui-rounded,"SF Pro Rounded","Hiragino Maru Gothic ProN","Nunito","PingFang TC",system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 15% -10%, #ECE7FF 0%, transparent 55%),
      radial-gradient(1000px 500px at 100% 0%, #E4F6EF 0%, transparent 50%),
      var(--paper);
    color:var(--ink); min-height:100vh; line-height:1.5;
    padding:18px 16px 40px; display:flex; justify-content:center;
  }
  .app{width:100%; max-width:740px}
  .tnum{font-variant-numeric:tabular-nums}

  /* ---------- header ---------- */
  header{display:flex; align-items:center; gap:14px; margin-bottom:16px}
  .logo{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,var(--violet),#9a7bff);
    display:grid;place-items:center;color:#fff;font-weight:800;font-size:26px;box-shadow:var(--shadow);flex:none;
    transform:rotate(-4deg)}
  .title h1{font-size:22px;font-weight:800;letter-spacing:.2px;line-height:1.1}
  .title p{font-size:12.5px;color:var(--ink2);font-weight:600}
  .stats{margin-left:auto;display:flex;gap:8px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:7px 11px;text-align:center;min-width:58px;box-shadow:0 2px 0 var(--line)}
  .stat b{display:block;font-size:18px;font-weight:800;line-height:1}
  .stat span{font-size:10px;color:var(--ink3);font-weight:700;letter-spacing:.4px;text-transform:uppercase}
  .stat.lv b{color:var(--violet)} .stat.st b{color:var(--marker);-webkit-text-stroke:.6px #E4B93B} .stat.streak b{color:var(--coral)}

  /* ---------- category chips ---------- */
  .cats{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 8px;margin-bottom:6px;scrollbar-width:none}
  .cats::-webkit-scrollbar{display:none}
  .chip{flex:none;border:1.5px solid var(--line);background:var(--card);border-radius:999px;
    padding:8px 14px;font-size:13px;font-weight:700;color:var(--ink2);cursor:pointer;white-space:nowrap;
    display:flex;align-items:center;gap:7px;transition:transform .12s, box-shadow .12s, border-color .12s}
  .chip .dot{width:9px;height:9px;border-radius:50%}
  .chip:hover{transform:translateY(-1px)}
  .chip[aria-pressed="true"]{color:#fff;border-color:transparent;box-shadow:var(--shadow)}
  .chip[data-c="all"][aria-pressed="true"]{background:var(--ink)}
  .chip[data-c="A"][aria-pressed="true"]{background:var(--catA)} .chip[data-c="B"][aria-pressed="true"]{background:var(--catB)}
  .chip[data-c="C"][aria-pressed="true"]{background:var(--catC)} .chip[data-c="D"][aria-pressed="true"]{background:var(--catD)}
  .chip[data-c="E"][aria-pressed="true"]{background:var(--catE)} .chip[data-c="F"][aria-pressed="true"]{background:var(--catF)}

  /* ---------- mode tabs ---------- */
  .modes{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 0 14px}
  .mode{border:1.5px solid var(--line);background:var(--card);border-radius:13px;padding:9px 4px;cursor:pointer;
    text-align:center;font-weight:700;color:var(--ink2);font-size:12px;transition:transform .12s,border-color .12s,background .12s}
  .mode .ic{font-size:20px;display:block;line-height:1.3}
  .mode:hover{transform:translateY(-1px)}
  .mode[aria-pressed="true"]{border-color:var(--violet);background:#F1EDFF;color:var(--violet-d)}

  /* ---------- practice card ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);
    padding:24px 22px 22px;position:relative;overflow:hidden;min-height:360px;display:flex;flex-direction:column}
  .card::before{content:"";position:absolute;inset:0 0 auto 0;height:6px;
    background:linear-gradient(90deg,var(--catA),var(--catB),var(--catC),var(--catD),var(--catE))}
  .prompt-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .catlabel{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;padding:4px 10px;border-radius:999px;color:#fff}
  .modehint{font-size:12.5px;color:var(--ink2);font-weight:600;margin-left:auto;text-align:right}
  .zh{font-size:15px;color:var(--ink2);font-weight:700;margin:14px 0 2px}
  .zh b{color:var(--ink)}
  .sent{font-size:14px;color:var(--ink3);font-weight:600;min-height:20px}
  .sent u{ text-decoration:none;background:var(--marker-soft);padding:1px 6px;border-radius:6px;color:var(--ink);font-weight:800;letter-spacing:1px}

  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:8px 0}

  .listen-btn{width:96px;height:96px;border-radius:50%;border:none;cursor:pointer;color:#fff;
    background:radial-gradient(circle at 35% 30%, #4bb6ec, var(--sky));font-size:40px;box-shadow:0 12px 26px -8px rgba(45,156,219,.6);
    transition:transform .12s} .listen-btn:hover{transform:scale(1.05)} .listen-btn:active{transform:scale(.96)}
  .mini{background:none;border:1.5px solid var(--line);border-radius:999px;padding:7px 14px;font-weight:700;
    color:var(--ink2);cursor:pointer;font-size:13px;font-family:inherit} .mini:hover{border-color:var(--sky);color:var(--sky)}
  .mini-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}

  /* tiles */
  .tiles{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
  .tile{width:44px;height:52px;border-radius:11px;display:grid;place-items:center;font-size:25px;font-weight:800;
    text-transform:lowercase;background:#F3F1FB;border:2px solid #E4DFFa;color:var(--ink)}
  .tile.blank{background:#FFFCF0;border:2.5px dashed #EEC53C}
  .tile.blank input{width:100%;height:100%;border:none;background:none;text-align:center;font:inherit;font-size:25px;
    font-weight:800;color:var(--violet-d);outline:none;text-transform:lowercase}
  .tile.trap{background:var(--marker);border-color:#E9C02F;box-shadow:0 3px 0 #E4B93B}
  .tile.ok{background:#E4F7EE;border-color:var(--green);color:var(--green-d)}
  .tile.bad{background:#FFE9E9;border-color:var(--coral);color:#D64545}

  .spellbox{width:100%;max-width:420px;font-family:ui-rounded,"SF Mono",inherit;font-size:30px;font-weight:800;
    text-align:center;letter-spacing:8px;padding:14px 12px;border-radius:16px;border:2.5px solid var(--line);
    background:#FBFBFE;color:var(--ink);outline:none;text-transform:lowercase}
  .spellbox:focus{border-color:var(--violet);background:#fff;box-shadow:0 0 0 4px #EDE7FF}
  .spellbox.ok{border-color:var(--green);background:#F1FBF6} .spellbox.bad{border-color:var(--coral);background:#FFF4F4}

  .opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:420px}
  .opt{padding:14px;border-radius:14px;border:2px solid var(--line);background:#FBFBFE;font-size:22px;font-weight:800;
    cursor:pointer;color:var(--ink);font-family:inherit;transition:transform .1s,border-color .1s}
  .opt:hover{transform:translateY(-2px);border-color:var(--sky)}
  .opt.ok{border-color:var(--green);background:#EFFAF4;color:var(--green-d)}
  .opt.bad{border-color:var(--coral);background:#FFF1F1;color:#D64545}

  /* feedback + actions */
  .feedback{min-height:26px;text-align:center;font-weight:800;font-size:16px}
  .feedback.ok{color:var(--green-d)} .feedback.bad{color:var(--coral)}
  .reveal{text-align:center;font-size:30px;font-weight:800;letter-spacing:1px;min-height:20px}
  .reveal .hl{background:linear-gradient(transparent 55%, var(--marker) 55%);padding:0 2px;border-radius:3px}
  .actions{display:flex;gap:10px;margin-top:14px}
  .btn{flex:1;border:none;border-radius:15px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;
    transition:transform .1s,box-shadow .1s}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:linear-gradient(135deg,var(--violet),#8a6bf0);color:#fff;box-shadow:0 8px 18px -8px var(--violet)}
  .btn.go{background:linear-gradient(135deg,var(--green),#41c98a);color:#fff;box-shadow:0 8px 18px -8px var(--green)}
  .btn.ghost{flex:none;background:#F1F1F8;color:var(--ink2);min-width:64px}
  .btn:disabled{opacity:.4;cursor:default}

  /* progress footer */
  .progress{margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px 18px}
  .progress h3{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);margin-bottom:10px;display:flex;justify-content:space-between}
  .progress h3 a{color:var(--ink3);font-size:11px;cursor:pointer;text-decoration:underline;font-weight:700}
  .bar{height:14px;border-radius:8px;background:#EEEFF7;overflow:hidden;display:flex}
  .bar i{display:block;height:100%}
  .bar .learn{background:#D9D5F2} .bar .prac{background:#B9E8D3} .bar .mast{background:var(--green)}
  .legend{display:flex;gap:16px;margin-top:10px;font-size:12px;color:var(--ink2);font-weight:700;flex-wrap:wrap}
  .legend span{display:flex;align-items:center;gap:6px} .legend i{width:11px;height:11px;border-radius:3px;display:inline-block}

  .foot{text-align:center;font-size:12px;color:var(--ink3);margin-top:18px;font-weight:600;line-height:1.7}

  canvas#fx{position:fixed;inset:0;pointer-events:none;z-index:50}
  @keyframes pop{0%{transform:scale(.7)}60%{transform:scale(1.12)}100%{transform:scale(1)}}
  .pop{animation:pop .32s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
  .shake{animation:shake .3s}
  .stat.ok b{color:var(--green)}
  .summary{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:var(--shadow)}
  .summary h3{display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:800;margin-bottom:12px}
  .summary h3 a{font-size:12px;color:var(--ink3);cursor:pointer;text-decoration:underline;font-weight:700}
  .bigrate{display:flex;align-items:center;gap:14px;background:#F6FBF8;border:1px solid #DBF0E6;border-radius:14px;padding:14px 16px}
  .bigrate>b{font-size:40px;color:var(--green);line-height:1}
  .bigrate span{font-size:13px;color:var(--ink2);font-weight:700}.bigrate small{color:var(--ink3);font-weight:600}
  .subh{font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);font-weight:800;margin:16px 0 8px}
  .chips-wrap{display:flex;flex-wrap:wrap;gap:6px}
  .wchip{font-size:13px;font-weight:700;padding:5px 10px;border-radius:8px;background:#F1F0FA;color:var(--ink)}
  .wchip.fixed{background:var(--marker-soft)}
  .sumtable{width:100%;border-collapse:collapse;font-size:13px}
  .sumtable td{padding:5px 0;border-bottom:1px solid var(--line);color:var(--ink2);font-weight:700}
  .sumtable td:last-child{text-align:right;color:var(--ink);font-variant-numeric:tabular-nums}
  .defs{font-size:11.5px;color:var(--ink3);margin-top:8px;font-weight:600;line-height:1.6}
  .defs b{color:var(--ink2)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @media (max-width:520px){
    .stats{width:100%;margin:8px 0 0} header{flex-wrap:wrap}
    .title h1{font-size:20px} .tile{width:40px;height:48px;font-size:22px}
  }
</style>
</head>
<body>

<canvas id="fx"></canvas>
<div class="app">
  <header>
    <div class="logo">拼</div>
    <div class="title">
      <h1>拼字小特工 <span style="font-size:13px;color:var(--ink3)">Spelling Agent</span></h1>
      <p>破解英文拼字的 6 大陷阱 · 每天 10 分鐘</p>
    </div>
    <div class="stats">
      <div class="stat lv"><b id="s-lv" class="tnum">1</b><span>等級</span></div>
      <div class="stat st"><b id="s-star" class="tnum">0</b><span>⭐精通</span></div>
      <div class="stat ok"><b id="s-correct" class="tnum">0</b><span>答對字</span></div>
      <div class="stat streak"><b id="s-streak" class="tnum">0</b><span>連勝</span></div>
    </div>
  </header>

  <nav class="cats" id="cats" aria-label="選擇類別"></nav>
  <div class="modes" id="modes" role="tablist" aria-label="練習模式"></div>

  <main class="card" id="card">
    <div class="prompt-row">
      <span class="catlabel" id="catlabel">類別</span>
      <span class="modehint" id="modehint"></span>
    </div>
    <div class="zh" id="zh"></div>
    <div class="sent" id="sent"></div>
    <div class="stage" id="stage"></div>
    <div class="feedback" id="feedback"></div>
    <div class="actions">
      <button class="btn ghost" id="peekBtn" title="偷看一下答案">👀 偷看</button>
      <button class="btn primary" id="checkBtn">檢查 Check</button>
    </div>
  </main>

  <section class="progress">
    <h3><span>學習進度 Progress</span>
      <span style="display:flex;gap:14px"><a id="sumBtn" title="看學習總結與答對率">📊 學習總結</a><a id="resetBtn" title="清除所有進度">重來 reset</a></span></h3>
    <div class="bar" title="連續答對越多次，字就越熟練"><i class="learn" id="b-learn"></i><i class="prac" id="b-prac"></i><i class="mast" id="b-mast"></i></div>
    <div class="legend">
      <span title="答對 1 次（或最近答錯，需要再練）"><i style="background:#D9D5F2"></i>學習中 <b id="n-learn" class="tnum">0</b></span>
      <span title="連續答對 2 次"><i style="background:#B9E8D3"></i>練習中 <b id="n-prac" class="tnum">0</b></span>
      <span title="連續答對 3 次，獲得 ⭐"><i style="background:var(--green)"></i>精通 <b id="n-mast" class="tnum">0</b></span>
      <span style="margin-left:auto;color:var(--ink3)">共 <b id="n-total" class="tnum">0</b> 字</span>
    </div>
    <p class="defs">熟練度定義：<b>學習中</b>＝答對 1 次 · <b>練習中</b>＝連續答對 2 次 · <b>精通</b>＝連續答對 3 次（答錯會退回「學習中」，該字也會更常出現）</p>
  </section>

  <section class="summary" id="summary" hidden></section>

  <p class="foot">
    🔊 需要開啟聲音才能聽發音（若沒聲音，按「偷看」會顯示單字）。進度會自動存在這台裝置。<br>
    方法：<b>看 → 唸 → 蓋 → 寫 → 對</b>，只盯著<span style="background:var(--marker-soft);padding:0 4px;border-radius:4px">螢光色的陷阱字母</span>。加油！
  </p>
</div>

<script>
/* ============ WORD BANK ============
   Cased spelling: UPPERCASE letters = the "trap" (hard) letters.
   Format: [casedWord, 中文, example sentence, category]  */

  ["watermElon","西瓜","watermElon is sweet.","F"],["congratUlation","恭喜","congratUlations to you!","F"]
];
// Homophones: [ [words...], 中文, sentence-with-___, answer ]
const HOMO = [
  [["to","too","two"],"到／也／二","I have ___ apples.","two"],
  [["there","their"],"那裡／他們的","Put it over ___.","there"],
  [["write","right"],"寫／對","Please ___ your name.","write"],
  [["week","weak"],"星期／虛弱","There are 7 days in a ___.","week"],
  [["meat","meet"],"肉／見面","Let's ___ at 3 o'clock.","meet"],
  [["know","no"],"知道／不","I ___ the answer.","know"],
  [["here","hear"],"這裡／聽見","Can you ___ me?","hear"],
  [["sea","see"],"海／看見","I ___ a bird.","see"],
  [["flour","flower"],"麵粉／花","A rose is a ___.","flower"],
  [["piece","peace"],"一片／和平","I want a ___ of cake.","piece"],
  [["our","hour"],"我們的／小時","One ___ has 60 minutes.","hour"],
  [["buy","by"],"買／在旁邊","I want to ___ a toy.","buy"]
];

/* build word objects */
function parse(cased){
  let word="",mask=[];
  for(const ch of cased){ const low=ch.toLowerCase(); mask.push(ch!==low && ch>='A'&&ch<='Z'); word+=low; }
  return {word,mask};
}
let WORDS = RAW.map((r,i)=>{const p=parse(r[0]);return{id:"w"+i,word:p.word,mask:p.mask,zh:r[1],sent:r[2],cat:r[3]};});
HOMO.forEach((h,i)=>WORDS.push({id:"h"+i,word:h[3],mask:h[3].split('').map(_=>false),zh:h[1],sent:h[2],cat:"E",homo:h[0]}));

/* ============ STATE (localStorage) ============ */
const LS="spellAgent.v1";
let DB = load();
function load(){ try{const d=JSON.parse(localStorage.getItem(LS)); return d?Object.assign(fresh(),d):fresh();}catch(e){return fresh();} }
function fresh(){return{box:{},stat:{},points:0,star:0,streak:0,best:0,attempts:0,correct:0};}
function distinctCorrect(){ return Object.values(DB.stat||{}).filter(s=>s.c>0).length; }
function passRate(){ return DB.attempts? Math.round(DB.correct/DB.attempts*100):0; }
function save(){ try{localStorage.setItem(LS,JSON.stringify(DB));}catch(e){} }
function box(id){return DB.box[id]||0;} // 0 new,1 learning,2 practicing,3 mastered

let curCat="all", curMode="listen", cur=null, answered=false;

/* ============ AUDIO ============ */
let voice=null;
function pickVoice(){ const vs=speechSynthesis.getVoices();
  voice = vs.find(v=>/en[-_]US/i.test(v.lang)&&/female|samantha|karen|zira|aria/i.test(v.name))
       || vs.find(v=>/en[-_]US/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || null; }
if('speechSynthesis'in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function say(text,rate){ if(!('speechSynthesis'in window))return;
  speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US"; u.rate=rate||.9; if(voice)u.voice=voice; speechSynthesis.speak(u); }
function spellOut(word){ if(!('speechSynthesis'in window))return; speechSynthesis.cancel();
  word.split('').forEach((c,i)=>{ const u=new SpeechSynthesisUtterance(c); u.lang="en-US"; u.rate=.7;
    if(voice)u.voice=voice; u.onstart=()=>{}; speechSynthesis.speak(u); }); }

/* ============ SELECTION (Leitner spaced repetition) ============ */
function pool(){ return WORDS.filter(w=>curCat==="all"||w.cat===curCat); }
function nextWord(){
  const p=pool(); if(!p.length)return null;
  // weight: lower box = more likely; brand-new words get a boost; avoid repeating current
  const weighted=[];
  p.forEach(w=>{ if(cur&&w.id===cur.id&&p.length>1)return;
    const b=box(w.id); const wgt = b===0?5 : b===1?6 : b===2?3 : 1;
    for(let k=0;k<wgt;k++)weighted.push(w); });
  return weighted[Math.floor(Math.random()*weighted.length)] || p[0];
}

/* ============ RENDER ============ */
const $=s=>document.querySelector(s);
const stage=$("#stage"), fb=$("#feedback");

function buildChips(){
  const c=$("#cats"); const items=[["all","全部",""]].concat(Object.keys(CATS).map(k=>[k,CATS[k].name,k]));
  c.innerHTML=items.map(([k,label])=>{
    const dot = k==="all"?"":`<span class="dot" style="background:${CATS[k].color}"></span>`;
    return `<button class="chip" data-c="${k}" aria-pressed="${k===curCat}">${dot}${label}</button>`;}).join("");
  c.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{curCat=b.dataset.c;
    c.querySelectorAll(".chip").forEach(x=>x.setAttribute("aria-pressed",x.dataset.c===curCat)); newRound();});
}
function buildModes(){
  const modes=[["listen","🎧","聽與拼"],["trap","🖍️","填陷阱"],["scramble","🧩","重組"],["peekmode","👀","看一眼"]];
  const m=$("#modes");
  m.innerHTML=modes.map(([k,ic,t])=>`<button class="mode" role="tab" data-m="${k}" aria-pressed="${k===curMode}">
    <span class="ic">${ic}</span>${t}</button>`).join("");
  m.querySelectorAll(".mode").forEach(b=>b.onclick=()=>{curMode=b.dataset.m;
    m.querySelectorAll(".mode").forEach(x=>x.setAttribute("aria-pressed",x.dataset.m===curMode)); render();});
}

const MHINT={listen:"聽發音，把單字拼出來",trap:"只要填出螢光色的陷阱字母",scramble:"把打散的字母排回正確順序",peekmode:"看一眼，蓋起來，再憑記憶拼出",homo:"看句子，選出正確的字"};

function newRound(){ cur=nextWord(); answered=false; render(); }

function render(){
  if(!cur){stage.innerHTML="<p>沒有單字</p>";return;}
  const isHomo = cur.cat==="E";
  const mode = isHomo? "homo" : curMode;
  fb.textContent=""; fb.className="feedback";
  $("#peekBtn").style.display = (mode==="homo")?"none":"";
  $("#checkBtn").disabled=false; $("#checkBtn").textContent="檢查 Check"; $("#checkBtn").className="btn primary";
  // header
  const c=CATS[cur.cat]; const cl=$("#catlabel"); cl.textContent=c.name; cl.style.background=c.color;
  $("#modehint").textContent=MHINT[mode];
  $("#zh").innerHTML = `意思：<b>${cur.zh}</b>`;
  // sentence: hide the target word
  let sent=cur.sent;
  if(!isHomo){ const re=new RegExp("\\b"+cur.word+"\\b","i"); sent=sent.replace(re,"<u>?????</u>"); }
  $("#sent").innerHTML = mode==="peekmode"?"":sent;

  if(mode==="homo") return renderHomo();
  if(mode==="trap") return renderTrap();
  if(mode==="scramble") return renderScramble();
  return renderListen(mode==="peekmode");
}

function renderListen(peekMode){
  stage.innerHTML="";
  const btn=document.createElement("button"); btn.className="listen-btn"; btn.setAttribute("aria-label","播放發音");
  btn.innerHTML="🔊"; btn.onclick=()=>say(cur.word);
  const row=document.createElement("div"); row.className="mini-row";
  const b2=document.createElement("button"); b2.className="mini"; b2.textContent="🐢 一個字母一個字母";
  b2.onclick=()=>spellOut(cur.word);
  const b3=document.createElement("button"); b3.className="mini"; b3.textContent="💬 唸例句";
  b3.onclick=()=>say(cur.sent,.85);
  row.append(b2,b3);
  const inp=document.createElement("input"); inp.className="spellbox"; inp.id="ans";
  inp.autocapitalize="none";inp.autocomplete="off";inp.autocorrect="off";inp.spellcheck=false;
  inp.placeholder="在這裡拼字…"; inp.onkeydown=e=>{if(e.key==="Enter")check();};
  if(peekMode){
    const peek=document.createElement("div"); peek.className="reveal pop"; peek.textContent=cur.word;
    stage.append(peek);
    say(cur.word);
    setTimeout(()=>{ if(peek.isConnected){peek.textContent="🙈 蓋起來了，拼拼看！"; peek.style.fontSize="20px"; peek.style.color="var(--ink3)";} },1800);
    stage.append(inp);
  }else{
    stage.append(btn,row,inp);
    say(cur.word);
  }
  setTimeout(()=>inp.focus(),50);
}

function renderTrap(){
  stage.innerHTML="";
  const wrap=document.createElement("div"); wrap.className="tiles";
  cur.word.split('').forEach((ch,i)=>{
    const t=document.createElement("div");
    if(cur.mask[i]){ t.className="tile blank"; const inp=document.createElement("input");
      inp.maxLength=1; inp.dataset.i=i; inp.autocapitalize="none"; inp.autocomplete="off"; inp.spellcheck=false;
      inp.oninput=()=>{ const ins=[...wrap.querySelectorAll("input")]; const cu=ins.indexOf(inp);
        if(inp.value&&cu<ins.length-1)ins[cu+1].focus(); };
      inp.onkeydown=e=>{ if(e.key==="Enter")check();
        if(e.key==="Backspace"&&!inp.value){const ins=[...wrap.querySelectorAll("input")];const cu=ins.indexOf(inp);if(cu>0)ins[cu-1].focus();}};
      t.append(inp);
    } else { t.className="tile"; t.textContent=ch; }
    wrap.append(t);
  });
  const hint=document.createElement("button"); hint.className="mini"; hint.textContent="🔊 聽發音"; hint.onclick=()=>say(cur.word);
  stage.append(wrap,hint);
  say(cur.word);
  setTimeout(()=>{const f=wrap.querySelector("input");if(f)f.focus();},50);
}

function renderScramble(){
  stage.innerHTML="";
  let letters=cur.word.split('');
  let sh; do{ sh=[...letters].sort(()=>Math.random()-.5); }while(sh.join('')===cur.word && cur.word.length>1);
  const scr=document.createElement("div"); scr.className="tiles";
  sh.forEach(ch=>{const t=document.createElement("div");t.className="tile";t.style.background="#EEF6FF";t.style.borderColor="#CBE4FA";t.textContent=ch;scr.append(t);});
  const inp=document.createElement("input"); inp.className="spellbox"; inp.id="ans";
  inp.autocapitalize="none";inp.autocomplete="off";inp.autocorrect="off";inp.spellcheck=false;
  inp.placeholder="排出正確的字…"; inp.onkeydown=e=>{if(e.key==="Enter")check();};
  const hint=document.createElement("button"); hint.className="mini"; hint.textContent="🔊 聽發音"; hint.onclick=()=>say(cur.word);
  stage.append(scr,inp,hint);
  setTimeout(()=>inp.focus(),50);
}

function renderHomo(){
  stage.innerHTML="";
  $("#sent").innerHTML = cur.sent.replace("___","<u>_____</u>");
  const opts=document.createElement("div"); opts.className="opts";
  [...cur.homo].sort(()=>Math.random()-.5).forEach(w=>{
    const b=document.createElement("button"); b.className="opt"; b.textContent=w;
    b.onclick=()=>{ if(answered)return;
      const correct = w===cur.word;
      b.classList.add(correct?"ok":"bad");
      if(!correct){ opts.querySelectorAll(".opt").forEach(o=>{if(o.textContent===cur.word)o.classList.add("ok");}); }
      finish(correct);
    };
    opts.append(b);
  });
  const hint=document.createElement("button"); hint.className="mini"; hint.textContent="🔊 唸句子"; hint.onclick=()=>say(cur.sent.replace("___",cur.word),.85);
  stage.append(opts,hint);
  $("#checkBtn").style.display="none";
}

/* ============ CHECK ============ */
function check(){
  if(answered){ newRound(); return; }
  if(cur.cat==="E") return;
  let guess="";
  if(curMode==="trap"){
    const ins=[...stage.querySelectorAll("input")]; let full=cur.word.split('');
    ins.forEach(inp=>{ full[+inp.dataset.i]=(inp.value||" ").toLowerCase(); });
    guess=full.join('');
  }else{
    const inp=$("#ans"); guess=(inp?inp.value:"").trim().toLowerCase();
  }
  if(!guess){ fb.textContent="先拼拼看再檢查喔 ✏️"; return; }
  const correct = guess===cur.word;
  // visual
  if(curMode==="trap"){
    stage.querySelectorAll(".tile.blank").forEach(t=>{ const inp=t.querySelector("input"); const i=+inp.dataset.i;
      const ok=(inp.value||"").toLowerCase()===cur.word[i]; t.classList.add(ok?"ok":"bad"); inp.disabled=true; });
  }else{ const inp=$("#ans"); if(inp){inp.classList.add(correct?"ok":"bad"); inp.disabled=true;} }
  finish(correct);
}

function finish(correct){
  answered=true;
  const b=box(cur.id);
  const st = DB.stat[cur.id] || (DB.stat[cur.id]={a:0,c:0,ew:false});
  st.a++; DB.attempts=(DB.attempts||0)+1;
  if(correct){ st.c++; DB.correct=(DB.correct||0)+1; } else { st.ew=true; }
  if(correct){
    DB.box[cur.id]=Math.min(3,b+1);
    DB.streak++; DB.best=Math.max(DB.best,DB.streak);
    const gain = 8 + Math.min(12,DB.streak*2);
    DB.points+=gain;
    if(DB.box[cur.id]===3 && b<3){ DB.star++; }
    fb.className="feedback ok";
    const cheer=["太棒了！","完全正確！","你好厲害！","拼對了！","答對啦！","進步好多！"];
    fb.textContent=`✅ ${cheer[Math.floor(Math.random()*cheer.length)]}  +${gain}`;
    confetti();
    $("#card").classList.remove("shake"); void $("#card").offsetWidth; $("#card").classList.add("pop");
    say(cur.word);
  }else{
    DB.box[cur.id]=Math.max(1,b>0?1:1); // send back to "learning"
    DB.streak=0;
    fb.className="feedback bad";
    // reveal with highlighted trap
    let html="正確拼法：<span class='reveal' style='display:inline'>";
    cur.word.split('').forEach((ch,i)=>{ html+= cur.mask[i]?`<span class="hl">${ch}</span>`:ch; });
    html+="</span>";
    fb.innerHTML="❌ 再看一次！ "+html;
    $("#card").classList.remove("pop"); void $("#card").offsetWidth; $("#card").classList.add("shake");
    spellOut(cur.word);
  }
  save(); updateStats();
  const cb=$("#checkBtn"); cb.style.display=""; cb.disabled=false; cb.textContent="下一個 Next →"; cb.className="btn go";
}

/* ============ STATS / PROGRESS ============ */
function updateStats(){
  let learn=0,prac=0,mast=0; const total=WORDS.length;
  WORDS.forEach(w=>{const b=box(w.id); if(b>=3)mast++; else if(b===2)prac++; else if(b===1)learn++;});
  $("#s-lv").textContent = 1+Math.floor(DB.points/120);
  $("#s-star").textContent = mast;
  $("#s-correct").textContent = distinctCorrect();
  $("#s-streak").textContent = DB.streak;
  $("#b-learn").style.width=(learn/total*100)+"%";
  $("#b-prac").style.width=(prac/total*100)+"%";
  $("#b-mast").style.width=(mast/total*100)+"%";
  $("#n-learn").textContent=learn; $("#n-prac").textContent=prac; $("#n-mast").textContent=mast; $("#n-total").textContent=total;
  if(!$("#summary").hidden) renderSummary();
}

function renderSummary(){
  const mastered=WORDS.filter(w=>box(w.id)>=3);
  const fixed=WORDS.filter(w=>box(w.id)>=3 && DB.stat[w.id] && DB.stat[w.id].ew);
  const dc=distinctCorrect(), pr=passRate();
  const catRows=Object.keys(CATS).map(k=>{
    const ws=WORDS.filter(w=>w.cat===k); const m=ws.filter(w=>box(w.id)>=3).length;
    const c=ws.filter(w=>DB.stat[w.id]&&DB.stat[w.id].c>0).length;
    return `<tr><td><span style="color:${CATS[k].color}">●</span> ${CATS[k].name}</td><td>答對 ${c}／精通 ${m}／共 ${ws.length}</td></tr>`;}).join("");
  const chip=w=>`<span class="wchip">${w.word}</span>`;
  const fchip=w=>`<span class="wchip fixed">${w.word}</span>`;
  $("#summary").innerHTML=`
    <h3>📊 學習總結 Summary <a id="sumClose">收起 ✕</a></h3>
    <div class="bigrate">
      <b class="tnum">${pr}%</b>
      <span>總答對率<br><small>${DB.correct||0} 題對 / 共作答 ${DB.attempts||0} 題</small></span>
      <span style="margin-left:auto;text-align:right">
        <b class="tnum" style="font-size:30px;color:var(--violet)">${dc}</b><br>
        <small>答對過的字（不重複）／ 共 ${WORDS.length} 字</small></span>
    </div>
    <div class="subh">各類別進度</div>
    <table class="sumtable">${catRows}</table>
    <div class="subh">✅ 已精通 ${mastered.length} 字（連續答對 3 次）</div>
    <div class="chips-wrap">${mastered.length?mastered.map(chip).join(""):'<span style="color:var(--ink3);font-size:13px">還沒有，繼續加油！</span>'}</div>
    <div class="subh">🛠️ 曾拼錯、現在已訂正 ${fixed.length} 字</div>
    <div class="chips-wrap">${fixed.length?fixed.map(fchip).join(""):'<span style="color:var(--ink3);font-size:13px">目前沒有</span>'}</div>`;
  $("#sumClose").onclick=()=>{ $("#summary").hidden=true; };
}

/* ============ CONFETTI ============ */
const cv=$("#fx"), ctx=cv.getContext("2d"); let parts=[],raf=null;
function sizeCv(){cv.width=innerWidth;cv.height=innerHeight;} sizeCv(); addEventListener("resize",sizeCv);
function confetti(){
  if(matchMedia("(prefers-reduced-motion:reduce)").matches)return;
  const cols=["#6C4CE0","#FFD84D","#2FB47C","#FF6B6B","#2D9CDB"];
  for(let i=0;i<80;i++)parts.push({x:cv.width/2,y:cv.height*.35,vx:(Math.random()-.5)*11,vy:Math.random()*-11-3,
    g:.32,s:6+Math.random()*7,c:cols[i%cols.length],rot:Math.random()*6,vr:(Math.random()-.5)*.4,life:0});
  if(!raf)raf=requestAnimationFrame(tick);
}
function tick(){ ctx.clearRect(0,0,cv.width,cv.height); parts.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life++;
  ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);ctx.restore();});
  parts=parts.filter(p=>p.y<cv.height+30&&p.life<160);
  if(parts.length)raf=requestAnimationFrame(tick); else{raf=null;ctx.clearRect(0,0,cv.width,cv.height);} }

/* ============ WIRE UP ============ */
$("#checkBtn").onclick=check;
$("#peekBtn").onclick=()=>{ if(cur){ say(cur.word);
  let html="🔍 "; cur.word.split('').forEach((ch,i)=>{html+=cur.mask[i]?`<span class="hl">${ch}</span>`:ch;});
  fb.className="feedback"; fb.innerHTML="<span class='reveal' style='display:inline;font-size:26px'>"+html+"</span>"; } };
$("#resetBtn").onclick=()=>{ if(confirm("確定要清除所有進度、星星和點數嗎？")){ DB=fresh(); save(); updateStats(); newRound(); } };
$("#sumBtn").onclick=()=>{ const s=$("#summary"); s.hidden=!s.hidden; if(!s.hidden){ renderSummary(); s.scrollIntoView({behavior:"smooth",block:"nearest"}); } };

buildChips(); buildModes(); updateStats(); newRound();
</script>
</body>
